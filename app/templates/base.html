<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="/static/js/transaction_modal.js"></script>

    <meta charset="UTF-8">
    <title>Finance App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }

        nav {
            margin-bottom: 30px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #2563eb;
        }

        .container {
            max-width: 900px;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        form {
            margin-bottom: 24px;
        }

        input, select, button {
            padding: 8px 10px;
            margin-right: 8px;
        }

        button {
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .error {
            padding: 10px;
            margin-bottom: 16px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
        }

        .delete-button {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .submit-button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .modify-button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            padding: 20px;
            margin: 10% auto;
            width: 300px;
            position: relative;
        }

        .hidden {
            display: none;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;

            background: transparent;
            border: none;

            font-size: 24px;
            line-height: 1;

            cursor: pointer;
            color: #666;

            padding: 5px 10px;
        }

        .modal-close:hover {
            color: #000;
        }

        .modal-close:active {
            transform: scale(0.9);
        }

        .modal-close:focus {
            outline: none;
        }

        .modal-close:focus-visible {
            outline: 2px solid #999;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/categories">Categories</a>
        <a href="/transactions">Transactions</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% include "components/transaction_modal.html" %}
</body>
</html>
